<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #F7F5F0;
      --border: #E2DED5;
      --text:   #1B1917;
      --muted:  #7A7870;
      --subtle: #B2AFA7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.7;
    }

    /* ── Nav ── */
    nav {
      padding: 0 2.5rem;
      height: 64px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(247,245,240,.95);
      position: sticky; top: 0; z-index: 50;
    }

    .back {
      font-size: .78rem; color: var(--muted); text-decoration: none;
      display: flex; align-items: center; gap: .4rem;
      transition: color .2s;
    }
    .back:hover { color: var(--text); }

    .nav-name {
      font-size: .78rem; font-weight: 500; color: var(--subtle);
      text-align: right;
    }

    /* ── Language switcher ── */
    .lang-switch {
      display: flex; align-items: center; gap: 0;
      justify-content: center;
    }
    .lang-btn {
      background: none; border: none; cursor: pointer;
      font-family: inherit; font-size: .78rem; font-weight: 500;
      letter-spacing: .05em; color: var(--subtle);
      padding: .25rem .3rem;
      transition: color .2s;
      position: relative; z-index: 0;
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active { color: var(--text); }
    .lang-sep {
      position: relative; z-index: 1;
      background: rgba(247,245,240,.95);
      font-size: .85rem; color: var(--border);
      padding: 0 2px; margin: 0 -5px;
      user-select: none; line-height: 1;
    }

    /* ── Main ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 2.5rem 6rem;
    }

    /* ── Header ── */
    .cv-header {
      margin-bottom: 3.5rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--border);
    }
    .cv-name {
      font-size: 2rem; font-weight: 600;
      letter-spacing: -.025em; line-height: 1.1;
      margin-bottom: .4rem;
    }
    .cv-title {
      font-size: .88rem; color: var(--muted); margin-bottom: 1.1rem;
    }
    .cv-contact {
      display: flex; flex-direction: column; gap: .2rem;
    }
    .cv-contact a {
      font-size: .8rem; color: var(--muted); text-decoration: none;
      transition: color .2s;
    }
    .cv-contact a:hover { color: var(--text); }
    .cv-location {
      font-size: .8rem; color: var(--subtle); margin-top: 1rem;
    }

    /* ── Section ── */
    .cv-section { margin-bottom: 3rem; }
    .cv-section-title {
      font-size: .62rem; font-weight: 500; letter-spacing: .16em;
      text-transform: uppercase; color: var(--subtle);
      margin-bottom: 1.25rem; padding-bottom: .6rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Entry ── */
    .entry {
      display: grid; grid-template-columns: 150px 1fr;
      gap: 1.5rem; padding: 1.1rem 0;
    }
    .entry:not(:last-child) { border-bottom: 1px solid var(--border); }
    .entry-date { font-size: .72rem; color: var(--subtle); padding-top: .15rem; line-height: 1.5; }
    .entry-title { font-size: .93rem; font-weight: 500; color: var(--text); margin-bottom: .15rem; }
    .entry-sub   { font-size: .82rem; color: var(--muted); margin-bottom: .4rem; }
    .entry-desc  { font-size: .82rem; color: var(--muted); line-height: 1.65; }

    /* ── Skills ── */
    .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem 3rem; }
    .skill-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: .55rem 0; border-bottom: 1px solid var(--border); font-size: .82rem;
    }
    .skill-name  { color: var(--text); }
    .skill-level { color: var(--subtle); font-size: .75rem; }

    /* ── Mobile ── */
    @media (max-width: 580px) {
      nav { padding: 0 1.5rem; }
      main { padding: 2.5rem 1.5rem 4rem; }
      .entry { grid-template-columns: 1fr; gap: .25rem; }
      .skills-grid { grid-template-columns: 1fr; }
      .nav-name { display: none; }
    }
  </style>
</head>

  function applyLang(lang) {
    const tr = t[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if (tr[k] !== undefined) el.innerHTML = tr[k];
    });
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    document.documentElement.lang = lang;
    localStorage.setItem('lang', lang);
  }

  const saved = localStorage.getItem('lang') || 'en';
  applyLang(saved);

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => applyLang(btn.dataset.lang));
  });
