<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jonas Kalwa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #F7F5F0;
      --border: #E2DED5;
      --text:   #1B1917;
      --muted:  #7A7870;
      --subtle: #B2AFA7;
      --link:   #2558D8;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 17px;
      line-height: 1.75;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── Cursor ── */
    #cur {
      position: fixed; width: 5px; height: 5px;
      background: var(--text); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
    }
    #cur-ring {
      position: fixed; width: 28px; height: 28px;
      border: 1.5px solid rgba(28,25,23,.15); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width .3s cubic-bezier(.23,1,.32,1),
                  height .3s cubic-bezier(.23,1,.32,1),
                  border-color .3s;
    }
    body:has(a:hover) #cur-ring,
    body:has(button:hover) #cur-ring {
      width: 44px; height: 44px;
      border-color: rgba(37,88,216,.35);
    }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      padding: 0 2.5rem;
      height: 64px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      background: rgba(247,245,240,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      transition: border-color .3s;
    }
    nav.scrolled { border-color: var(--border); }

    .nav-name {
      font-size: .82rem; font-weight: 500; color: var(--muted);
      text-decoration: none; transition: color .2s;
    }
    .nav-name:hover { color: var(--text); }

    .nav-right {
      display: flex; align-items: center; gap: 1.5rem;
      justify-content: flex-end;
    }
    .nav-right a {
      font-size: .75rem; color: var(--subtle);
      text-decoration: none; transition: color .2s;
    }
    .nav-right a:hover { color: var(--text); }

    /* ── Language switcher ── */
    .lang-switch {
      display: flex; align-items: center; gap: 0;
      justify-content: center;
    }
    .lang-btn {
      background: none; border: none; cursor: none;
      font-family: inherit; font-size: .78rem; font-weight: 500;
      letter-spacing: .05em;
      color: var(--subtle);
      padding: .25rem .3rem;
      transition: color .2s;
      position: relative; z-index: 0;
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active { color: var(--text); }

    .lang-sep {
      position: relative; z-index: 1;
      background: rgba(247,245,240,.92);
      font-size: .85rem; color: var(--border);
      padding: 0 2px; margin: 0 -5px;
      user-select: none; line-height: 1;
    }

    /* ── Main ── */
    main {
      max-width: 660px;
      margin: 0 auto;
      padding: 11rem 2.5rem 5rem;
    }

    /* ── Greeting ── */
    .greeting {
      font-size: clamp(2.25rem, 5vw, 3.25rem);
      font-weight: 600;
      letter-spacing: -.03em;
      line-height: 1.12;
      margin-bottom: 2.5rem;
    }

    /* ── Prose ── */
    .prose {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.82;
    }
    .prose p { margin-bottom: 1.3rem; }
    .prose p:last-child { margin-bottom: 0; }

    a.link {
      color: var(--link); text-decoration: none;
      border-bottom: 1px solid rgba(37,88,216,.22);
      transition: border-color .2s;
    }
    a.link:hover { border-color: rgba(37,88,216,.6); }

    /* ── Divider ── */
    hr {
      border: none; border-top: 1px solid var(--border);
      margin: 3.5rem 0;
    }

    /* ── Label ── */
    .label {
      font-size: .67rem; font-weight: 500; letter-spacing: .14em;
      text-transform: uppercase; color: var(--subtle);
      margin-bottom: 1rem;
    }

    /* ── Hackathon list ── */
    .hack-list { list-style: none; }
    .hack-list li {
      display: flex; gap: 2rem; align-items: baseline;
      padding: 1.1rem 0;
    }
    .hack-list li:not(:last-child) { border-bottom: 1px solid var(--border); }
    .hack-list li:hover { }

    .hack-where {
      font-size: .7rem; color: var(--subtle); letter-spacing: .04em;
      min-width: 96px; flex-shrink: 0; padding-top: .1rem;
    }
    .hack-what {
      font-size: .95rem; color: var(--muted); line-height: 1.6;
    }
    .hack-what strong { color: var(--text); font-weight: 500; }

    /* ── Contact ── */
    .contact-grid {
      display: flex; flex-direction: column; gap: .2rem;
    }
    .contact-grid a {
      display: inline-flex; align-items: center; gap: .6rem;
      font-size: 1rem; color: var(--muted); text-decoration: none;
      padding: .55rem 0; border-bottom: 1px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .contact-grid a:hover { color: var(--text); border-color: var(--border); }
    .contact-grid .arrow { color: var(--subtle); font-size: .8rem; }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 2.5rem 2rem 3.5rem;
      font-size: .68rem; color: var(--subtle); letter-spacing: .06em;
    }

    /* ── Reveal ── */
    .r {
      opacity: 0; transform: translateY(12px);
      transition: opacity .55s ease, transform .55s ease;
    }
    .r.d1 { transition-delay: .07s; }
    .r.d2 { transition-delay: .14s; }
    .r.d3 { transition-delay: .21s; }
    .r.d4 { transition-delay: .28s; }
    .r.in  { opacity: 1; transform: none; }

    /* ── Mobile ── */
    @media (max-width: 580px) {
      body { font-size: 16px; }
      nav { padding: 0 1.5rem; }
      main { padding: 8rem 1.5rem 4rem; }
      .hack-list li { flex-direction: column; gap: .15rem; }
      .hack-where { min-width: unset; }
    }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<nav id="nav">
  <a href="#" class="nav-name">Jonas Kalwa</a>
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="en">EN</button>
    <span class="lang-sep">/</span>
    <button class="lang-btn" data-lang="de">DE</button>
  </div>
  <div class="nav-right">
    <a href="https://www.linkedin.com/in/jonas-kalwa/" target="_blank" rel="noopener">LinkedIn</a>
    <a href="mailto:kalwajonas@gmail.com">Contact</a>
  </div>
</nav>

<main>

  <h1 class="greeting r" data-i18n="greeting"></h1>

  <div class="prose r d1">
    <p data-i18n="p1"></p>
    <p data-i18n="p2"></p>
    <p data-i18n="p3"></p>
    <p data-i18n="p4"></p>
  </div>

  <hr class="r d2" />

  <div class="r d3">
    <div class="label" data-i18n="buildsLabel"></div>
    <ul class="hack-list">
      <li>
        <span class="hack-where" data-i18n="where1"></span>
        <span class="hack-what" data-i18n="hack1"></span>
      </li>
      <li>
        <span class="hack-where" data-i18n="where2"></span>
        <span class="hack-what" data-i18n="hack2"></span>
      </li>
      <li>
        <span class="hack-where" data-i18n="where3"></span>
        <span class="hack-what" data-i18n="hack3"></span>
      </li>
      <li>
        <span class="hack-where" data-i18n="where4"></span>
        <span class="hack-what" data-i18n="hack4"></span>
      </li>
    </ul>
  </div>

  <hr class="r d4" />

  <div class="r d4">
    <div class="prose" style="margin-bottom:1.75rem;">
      <p data-i18n="contactP"></p>
    </div>
    <div class="contact-grid">
      <a href="https://www.linkedin.com/in/jonas-kalwa/" target="_blank" rel="noopener">
        <span class="arrow">→</span> LinkedIn
      </a>
      <a href="mailto:kalwajonas@gmail.com">
        <span class="arrow">→</span> kalwajonas@gmail.com
      </a>
    </div>
  </div>

</main>

<footer>Vechta / Osnabrück · 2026</footer>

<script>
  // ── Translations ──
  const translations = {
    en: {
      greeting:    "Hi, I'm Jonas.",
      p1:          `I'm 20, based in Vechta, Lower Saxony. I work at <a href="https://www.poeppelmann.com" target="_blank" rel="noopener" class="link">Pöppelmann</a> - a manufacturing company - where I help the marketing team actually use AI, not just talk about it. I'm also studying Economics at <a href="https://www.uni-osnabrueck.de" target="_blank" rel="noopener" class="link">Uni Osnabrück</a>.`,
      p2:          `On the side, I'm building an AI-driven B2B SaaS solution. Still early, still a lot to learn - which is honestly the best part.`,
      p3:          `I spend a lot of weekends at hackathons. Less for the prizes, more because of the deadline that forces you to ship, the startups and people you meet, and the amount you can learn from someone completely different in just a couple of hours.`,
      p4:          `When I'm not doing any of that, I'm at the gym or on the basketball court.`,
      buildsLabel: `Things I've built`,
      where1: 'Munich 2026', where2: 'Berlin 2026', where3: 'Hamburg 2026', where4: 'Vechta 2026',
      hack1:       `<strong>2D sketch to 3D CAD</strong> - automatically generating manufacturable CAD models from 2D technical drawings.`,
      hack2:       `<strong>AI Search Visibility</strong> - shows brands how visible they are inside AI search, and where they're quietly losing revenue because of it.`,
      hack3:       `<strong>3D scanning tool for tradespeople</strong> - a tool that turns footage into an explorable 3D model, designed to make spatial documentation easier for people working on-site.`,
      hack4:       `<strong>Campaign orchestration system</strong> - a 5-phase structure from "never heard of you" to buying, built as challenge owner for Pöppelmann.`,
      contactP:    `If you want to say hi, talk about business or AI, or just hear more about what I've been building at hackathons - feel free to reach out. And if you want to know more about me, take a look at my <a href="cv.html" class="link">CV</a>.`,
    },
    de: {
      greeting:    'Hi, ich bin Jonas.',
      p1:          `Ich bin 20, komme aus Vechta in Niedersachsen und arbeite bei <a href="https://www.poeppelmann.com" target="_blank" rel="noopener" class="link">Pöppelmann</a> - einem Produktionsunternehmen - wo ich dem Marketingteam helfe, KI wirklich einzusetzen, nicht nur darüber zu reden. Nebenbei studiere ich Wirtschaftswissenschaften an der <a href="https://www.uni-osnabrueck.de" target="_blank" rel="noopener" class="link">Uni Osnabrück</a>.`,
      p2:          `Daneben baue ich gerade eine KI-gestützte B2B-SaaS-Lösung auf. Noch früh, noch viel zu lernen - aber das ist ehrlich gesagt der beste Teil.`,
      p3:          `Viele meiner Wochenenden verbringe ich auf Hackathons. Weniger wegen der Preise, mehr wegen der Deadline, die einen zwingt wirklich zu liefern, der Startups und Menschen, die man kennenlernt, und dem, was man von völlig verschiedenen Leuten in ein paar Stunden lernen kann.`,
      p4:          `Wenn ich das alles mal nicht mache, bin ich im Gym oder auf dem Basketballplatz.`,
      buildsLabel: 'Was ich gebaut habe',
      where1: 'München 2026', where2: 'Berlin 2026', where3: 'Hamburg 2026', where4: 'Vechta 2026',
      hack1:       `<strong>2D-Skizze zu 3D-CAD</strong> - automatische Generierung von CAD-Modellen aus technischen 2D-Zeichnungen.`,
      hack2:       `<strong>KI-Suchsichtbarkeit</strong> - zeigt Marken, wie sichtbar sie in KI-Suchen sind, und wo sie dabei unbemerkt Umsatz verlieren.`,
      hack3:       `<strong>3D-Scanning-Tool für Handwerker</strong> - wandelt Filmmaterial in ein interaktives 3D-Modell um und macht räumliche Dokumentation vor Ort einfacher.`,
      hack4:       `<strong>Kampagnen-Orchestrierungssystem</strong> - eine 5-Phasen-Struktur von "noch nie gehört" bis zur Kaufentscheidung, entwickelt als Challenge Owner für Pöppelmann.`,
      contactP:    `Wenn du Hallo sagen möchtest, über Business oder KI reden willst oder einfach mehr über meine Hackathon-Erfahrungen hören möchtest - melde dich gerne. Und wenn du mehr über mich erfahren möchtest, schau dir gern meinen <a href="cv.html" class="link">Lebenslauf</a> an.`,
    }
  };

  // ── Apply language ──
  function applyLang(lang) {
    const t = translations[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.innerHTML = t[key];
    });
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    document.documentElement.lang = lang;
    localStorage.setItem('lang', lang);
  }

  // ── Init ──
  const savedLang = localStorage.getItem('lang') || 'en';
  applyLang(savedLang);

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => applyLang(btn.dataset.lang));
  });

  // ── Cursor ──
  const cur  = document.getElementById('cur');
  const ring = document.getElementById('cur-ring');
  let rx = 0, ry = 0, mx = 200, my = 200;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px'; cur.style.top = my + 'px';
  });

  (function tick() {
    rx += (mx - rx) * .1; ry += (my - ry) * .1;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(tick);
  })();

  // ── Nav scroll ──
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 20);
  }, { passive: true });

  // ── Reveal ──
  const obs = new IntersectionObserver(
    entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); }),
    { threshold: 0.06 }
  );
  document.querySelectorAll('.r').forEach(el => obs.observe(el));
</script>

</body>
</html>
